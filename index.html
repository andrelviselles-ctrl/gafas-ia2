<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Asistente Visual (iPhone)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #222; color: white; margin: 0; padding: 10px; }
        .container { position: relative; display: inline-block; margin-top: 10px; }
        #imgOculta { display: none; }
        #canvasOutput { border: 2px solid #fff; border-radius: 10px; background-color: #000; width: 320px; height: 240px; }
        button { padding: 15px; font-size: 18px; margin: 10px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; width: 90%; max-width: 320px; }
        #status { font-size: 18px; font-weight: bold; margin: 10px; color: yellow; }
    </style>
</head>
<body>

    <h2>Asistente IA ESP32</h2>
    <div id="status">Cargando Modelo de IA...</div>

    <img id="imgOculta" crossorigin="anonymous" />
    
    <div class="container">
        <canvas id="canvasOutput" width="320" height="240"></canvas>
    </div>

    <br>
    <button id="btnStart" disabled>Iniciar Detección</button>

    <script>
        // ==========================================
        // AQUÍ ESTÁ TU IP YA CONFIGURADA
        // ==========================================
        const ESP32_URL = "http://192.168.1.10/capture"; 
        
        const imgElement = document.getElementById('imgOculta');
        const canvas = document.getElementById('canvasOutput');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status');
        const btnStart = document.getElementById('btnStart');
        
        let model = null;
        let isDetecting = false;
        let timerAnalisis = null;

        // 1. Cargar el modelo pre-entrenado
        async function cargarModelo() {
            try {
                model = await cocoSsd.load(); 
                statusText.innerText = "IA Lista. Presiona Iniciar.";
                statusText.style.color = "#00FF00";
                btnStart.disabled = false;
            } catch (error) {
                statusText.innerText = "Error cargando la IA.";
                console.error(error);
            }
        }

        // 2. Función que pide una foto nueva al ESP32 y la analiza
        async function procesarFrame() {
            if (!isDetecting) return;

            // Le pedimos al ESP32 la foto a través de tu IP
            imgElement.src = `${ESP32_URL}?nocache=${Math.random()}`;

            // Cuando la foto termina de cargar desde tu ESP32, la IA la analiza
            imgElement.onload = async () => {
                ctx.drawImage(imgElement, 0, 0, canvas.width, canvas.height);

                const predicciones = await model.detect(canvas);

                predicciones.forEach(prediccion => {
                    const [x, y, width, height] = prediccion.bbox;
                    const objeto = prediccion.class;
                    const seguridad = Math.round(prediccion.score * 100);

                    // Si detecta obstáculos importantes (Personas, carros, camiones, sillas)
                    if(objeto === "person" || objeto === "car" || objeto === "truck" || objeto === "chair") {
                        ctx.strokeStyle = "#FF0000";
                        ctx.lineWidth = 4;
                        ctx.strokeRect(x, y, width, height);
                        
                        ctx.fillStyle = "#FF0000";
                        ctx.fillRect(x, y - 20, width, 20);
                        ctx.fillStyle = "#FFFFFF";
                        ctx.font = "16px Arial";
                        ctx.fillText(`${objeto} (${seguridad}%)`, x + 5, y - 5);

                        // Si estás en celular y detecta algo, vibra
                        if(seguridad > 70 && navigator.vibrate) {
                            navigator.vibrate(150); 
                        }
                    }
                });

                // Pedir la siguiente foto inmediatamente
                if(isDetecting) {
                    timerAnalisis = setTimeout(procesarFrame, 50);
                }
            };

            // Si hay un error, reintentar
            imgElement.onerror = () => {
                if(isDetecting) {
                    timerAnalisis = setTimeout(procesarFrame, 1000);
                }
            };
        }

        // 3. Control del botón
        btnStart.addEventListener('click', () => {
            if(!isDetecting) {
                isDetecting = true;
                btnStart.innerText = "Detener Detección";
                btnStart.style.backgroundColor = "#F44336";
                statusText.innerText = "Analizando en vivo...";
                procesarFrame(); 
            } else {
                isDetecting = false;
                clearTimeout(timerAnalisis);
                btnStart.innerText = "Iniciar Detección";
                btnStart.style.backgroundColor = "#4CAF50";
                statusText.innerText = "Pausado";
            }
        });

        // Iniciar
        cargarModelo();
    </script>
</body>
</html>
