<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Asistente Visual (Universal)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #222; color: white; margin: 0; padding: 15px; }
        .setup-box { background: #333; padding: 20px; border-radius: 10px; margin: 20px auto; max-width: 320px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        input[type="text"] { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #555; font-size: 16px; text-align: center; background: #111; color: #0f0; }
        .container { position: relative; display: inline-block; margin-top: 10px; display: none; }
        #imgOculta { display: none; }
        #canvasOutput { border: 2px solid #fff; border-radius: 10px; background-color: #000; width: 320px; height: 240px; }
        button { padding: 15px; font-size: 18px; margin: 10px 0; background-color: #2196F3; color: white; border: none; border-radius: 5px; width: 100%; cursor: pointer; font-weight: bold; }
        .btn-start { background-color: #4CAF50; display: none; }
        #status { font-size: 16px; font-weight: bold; margin: 10px; color: yellow; }
        h2 { margin-bottom: 5px; }
        .small-text { font-size: 12px; color: #aaa; margin-top: 5px; }
    </style>
</head>
<body>

    <h2>Gafas IA Asistentes</h2>
    <div id="status">Esperando conexión...</div>

    <!-- PANEL DE CONFIGURACIÓN -->
    <div class="setup-box" id="setupPanel">
        <label>Ingrese la IP de las Gafas (ESP32):</label>
        
        <!-- Lista de historial de IPs -->
        <input type="text" id="ipInput" list="ipHistory" placeholder="Ej: 192.168.1.10">
        <datalist id="ipHistory"></datalist>
        
        <button id="btnConnect" onclick="conectarCamara()">Conectar a Gafas</button>
        <div class="small-text">Su IP se guardará automáticamente.</div>
    </div>

    <!-- VIDEO E IA -->
    <img id="imgOculta" crossorigin="anonymous" />
    <div class="container" id="videoContainer">
        <canvas id="canvasOutput" width="320" height="240"></canvas>
    </div>

    <button class="btn-start" id="btnStart">Iniciar Detección</button>

    <script>
        const imgElement = document.getElementById('imgOculta');
        const canvas = document.getElementById('canvasOutput');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status');
        const btnStart = document.getElementById('btnStart');
        const setupPanel = document.getElementById('setupPanel');
        const videoContainer = document.getElementById('videoContainer');
        const ipInput = document.getElementById('ipInput');
        const ipHistoryList = document.getElementById('ipHistory');
        
        let model = null;
        let isDetecting = false;
        let timerAnalisis = null;
        let esp32Url = "";

        // 1. Cargar historial de IPs guardadas al iniciar
        function cargarHistorialIP() {
            // Leer la última IP usada
            const ultimaIP = localStorage.getItem('ultimaIP');
            if (ultimaIP) {
                ipInput.value = ultimaIP;
            }

            // Cargar el menú desplegable con todas las IPs guardadas
            let historial = JSON.parse(localStorage.getItem('historialIPs')) || [];
            ipHistoryList.innerHTML = "";
            historial.forEach(ip => {
                let option = document.createElement('option');
                option.value = ip;
                ipHistoryList.appendChild(option);
            });
        }

        // 2. Guardar nueva IP en la memoria del celular
        function guardarIP(nuevaIP) {
            localStorage.setItem('ultimaIP', nuevaIP);
            
            let historial = JSON.parse(localStorage.getItem('historialIPs')) || [];
            if (!historial.includes(nuevaIP)) {
                historial.push(nuevaIP);
                localStorage.setItem('historialIPs', JSON.stringify(historial));
            }
        }

        // 3. Cargar el modelo pre-entrenado de fondo
        async function cargarModelo() {
            try {
                statusText.innerText = "Descargando IA en el celular...";
                model = await cocoSsd.load(); 
                statusText.innerText = "IA Lista. Confirme la IP y conecte.";
                statusText.style.color = "#00FF00";
            } catch (error) {
                statusText.innerText = "Error de red al cargar la IA.";
                console.error(error);
            }
        }

        // 4. Función cuando el usuario presiona "Conectar"
        function conectarCamara() {
            let ip = ipInput.value.trim();
            if(!ip) {
                alert("Por favor ingrese una dirección IP válida.");
                return;
            }
            
            ip = ip.replace("http://", "").replace("https://", "").replace("/", "");
            
            // Guardar la IP para el futuro
            guardarIP(ip);
            
            esp32Url = `http://${ip}/capture`;

            // Ocultar panel de setup y mostrar video
            setupPanel.style.display = "none";
            videoContainer.style.display = "inline-block";
            btnStart.style.display = "inline-block";
            btnStart.disabled = false;
            statusText.innerText = `Gafas vinculadas. Presione Iniciar.`;
        }

        // 5. Procesar los frames del ESP32
        async function procesarFrame() {
            if (!isDetecting) return;

            imgElement.src = `${esp32Url}?nocache=${Math.random()}`;

            imgElement.onload = async () => {
                ctx.drawImage(imgElement, 0, 0, canvas.width, canvas.height);

                if(model) {
                    const predicciones = await model.detect(canvas);
                    predicciones.forEach(prediccion => {
                        const [x, y, width, height] = prediccion.bbox;
                        const objeto = prediccion.class;
                        const seguridad = Math.round(prediccion.score * 100);

                        if(["person", "car", "truck", "bus", "chair"].includes(objeto)) {
                            ctx.strokeStyle = "#FF0000";
                            ctx.lineWidth = 4;
                            ctx.strokeRect(x, y, width, height);
                            
                            ctx.fillStyle = "#FF0000";
                            ctx.fillRect(x, y - 20, width, 20);
                            ctx.fillStyle = "#FFFFFF";
                            ctx.font = "16px Arial";
                            ctx.fillText(`${objeto} (${seguridad}%)`, x + 5, y - 5);

                            if(seguridad > 65 && navigator.vibrate) {
                                navigator.vibrate(150); 
                            }
                        }
                    });
                }

                if(isDetecting) timerAnalisis = setTimeout(procesarFrame, 50);
            };

            imgElement.onerror = () => {
                if(isDetecting) {
                    ctx.fillStyle = "black";
                    ctx.fillRect(0,0, canvas.width, canvas.height);
                    ctx.fillStyle = "red";
                    ctx.fillText(`Fallo en red. Buscando ${ipInput.value}...`, 50, 120);
                    timerAnalisis = setTimeout(procesarFrame, 1500);
                }
            };
        }

        // 6. Control del botón principal
        btnStart.addEventListener('click', () => {
            if(!isDetecting) {
                isDetecting = true;
                btnStart.innerText = "Detener Detección";
                btnStart.style.backgroundColor = "#F44336";
                statusText.innerText = "Analizando video en vivo...";
                procesarFrame(); 
            } else {
                isDetecting = false;
                clearTimeout(timerAnalisis);
                btnStart.innerText = "Reanudar Detección";
                btnStart.style.backgroundColor = "#4CAF50";
                statusText.innerText = "Pausado";
            }
        });

        // Inicializar
        cargarHistorialIP();
        cargarModelo();
    </script>
</body>
</html>
